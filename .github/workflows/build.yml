name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Install dependencies
      run: |
        cd poker_killer_app
        flutter pub get
    
    - name: Build APK
      run: |
        cd poker_killer_app
        flutter build apk --release
    
    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KartenKiller
        path: poker_killer_app/build/app/outputs/flutter-apk/app-release.apk
