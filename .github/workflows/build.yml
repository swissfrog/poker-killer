name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9'
        channel: 'stable'
    
    - name: Get dependencies
      run: |
        cd poker_ai_app
        flutter pub get
    
    - name: Build APK
      run: |
        cd poker_ai_app
        flutter build apk --debug || echo "Build failed but continuing"
        ls -la build/app/outputs/flutter-apk/ || true
