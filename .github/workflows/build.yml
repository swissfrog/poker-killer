name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: Remove dirs with v1 embedding remnants
        run: |
          rm -rf trainer
          rm -rf poker_ai_app

      - name: Prepare assets
        run: |
          mkdir -p poker_killer_app/assets
          wget -q "https://github.com/swissfrog/poker-killer/releases/download/models-v5/64x3-cards.tflite" \
            -O poker_killer_app/assets/64x3-cards.tflite
          wget -q "https://github.com/swissfrog/poker-killer/releases/download/models-v5/poker_brain.tflite" \
            -O poker_killer_app/assets/poker_brain.tflite
          # Create placeholder for RL model if not available
          if [ ! -f poker_killer_app/assets/poker_brain_rl.tflite ]; then
            cp poker_killer_app/assets/poker_brain.tflite poker_killer_app/assets/poker_brain_rl.tflite
          fi
          # Create placeholder app icon
          convert -size 48x48 xc:'#00ff88' poker_killer_app/assets/app_icon.png 2>/dev/null \
            || python3 -c "
          import struct, zlib
          def png(w,h):
            def chunk(t,d):return struct.pack('>I',len(d))+t+d+struct.pack('>I',zlib.crc32(t+d)&0xffffffff)
            raw=b''
            for y in range(h):raw+=b'\x00'+b'\x00\xff\x88\xff'*w
            return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,6,0,0,0))+chunk(b'IDAT',zlib.compress(raw))+chunk(b'IEND',b'')
          open('poker_killer_app/assets/app_icon.png','wb').write(png(48,48))
          "
          ls -lh poker_killer_app/assets/

      - name: Flutter pub get
        working-directory: poker_killer_app
        run: flutter pub get

      - name: Clean stale Java source files
        working-directory: poker_killer_app
        run: |
          rm -rf android/app/src/main/java/io

      - name: Build APK
        working-directory: poker_killer_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: otto-apk
          path: poker_killer_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
